site_name: harmonic
site_description: Multi-harmonic transit-timing-variation model fitting and transit prediction
site_url: https://john-livingston.github.io/harmonic
repo_url: https://github.com/john-livingston/harmonic
repo_name: john-livingston/harmonic

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true
  - tables
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: false
            heading_level: 2

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Guide: usage.md
  - The TTV model: model.md
  - CLI reference: cli.md
  - API reference: api.md
